name: Build and Push Docker Image

on:
  push:
    branches:
      - main   # adjust to your branch name

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # e.g. your-user/your-repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write  # required to push to GHCR

    steps:
      # 1. Check out source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java (adjust version/distribution to match your project)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'   # or 'gradle'

      # 3. Build the JAR (skipping tests — remove flag if you want them to run)
      - name: Build with Maven
        run: mvn -B package --file pom.xml -DskipTests
        # If using Gradle:
        # run: ./gradlew build -x test

      # 4. Log in to GHCR using the built-in GITHUB_TOKEN (no secrets needed)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Extract metadata for smart image tagging
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha          # e.g. sha-a1b2c3d  (unique per commit)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 6. Build and push the image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile   # ← add this line
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}